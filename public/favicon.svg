<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#1a9b8e"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <radialGradient id="gloss" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a9b8e" />
      <stop offset="100%" style="stop-color:#0d4f5c" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="48" height="48" rx="10" fill="url(#grad)"/>
  
  <!-- Gloss/shine effect -->
  <rect width="48" height="48" rx="10" fill="url(#gloss)"/>
  
  <!-- O letter with modern styling -->
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="0">O</text>
  
  <!-- Energy indicator: three small dots representing renewable energy -->
  <circle cx="28" cy="12" r="2.5" fill="#f0c978" opacity="0.9"/>
  <circle cx="32" cy="14" r="2" fill="#f0c978" opacity="0.7"/>
  <circle cx="36" cy="16" r="1.5" fill="#f0c978" opacity="0.5"/>
</svg>