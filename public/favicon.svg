<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a9d7d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1bb8a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5f7a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shineGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="topGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="64" cy="64" r="64" fill="url(#bgGradient)" />

  <!-- Inner rings for depth -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" />
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />

  <!-- Main O letter -->
  <text x="64" y="85" font-size="68" font-weight="700" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle" fill="white" letter-spacing="-2">O</text>

  <!-- Premium shine effect -->
  <circle cx="45" cy="45" r="22" fill="url(#shineGradient)" />

  <!-- Top border highlight -->
  <rect x="0" y="0" width="128" height="2" fill="url(#topGlow)" />

  <!-- Energy indicator dots -->
  <circle cx="100" cy="40" r="3.5" fill="rgba(255,255,255,0.6)" opacity="0.7" />
  <circle cx="105" cy="50" r="2.5" fill="rgba(255,255,255,0.5)" opacity="0.5" />
  <circle cx="102" cy="60" r="2" fill="rgba(255,255,255,0.4)" opacity="0.4" />
</svg>